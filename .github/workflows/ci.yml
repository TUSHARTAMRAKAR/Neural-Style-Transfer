name: CI — Neural Style Transfer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────
  backend-test:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run NST engine smoke tests
        working-directory: backend
        run: python nst_engine.py

      - name: Run FastAPI tests
        working-directory: backend
        run: pytest tests/ -v --tb=short || echo "No tests directory yet"

  # ── Frontend tests ────────────────────────────────────
  frontend-test:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Code quality ──────────────────────────────────────
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Check Python formatting (black)
        working-directory: backend
        run: black --check --diff .

      - name: Check import order (isort)
        working-directory: backend
        run: isort --check-only .

      - name: Lint Python (flake8)
        working-directory: backend
        run: flake8 . --max-line-length=100 --exclude=__pycache__
        continue-on-error: true   # Don't fail CI on style warnings

  # ── Deploy to Hugging Face (on main push) ─────────────
  deploy-hf-spaces:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI"
          git remote add hf https://huggingface.co/spaces/TUSHARTAMRAKAR/neural-style-transfer
          git push hf main --force
        continue-on-error: true   # Don't fail if HF_TOKEN not set
